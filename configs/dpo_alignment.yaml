# Nexuss Transformer Framework - DPO Alignment Configuration
# Direct Preference Optimization for RLHF with EthioBBPE

model:
  # Reference model (SFT fine-tuned)
  model_name_or_path: "outputs/finetune_lora/checkpoint-5000"
  ref_model_name_or_path: "outputs/finetune_lora/checkpoint-5000"
  
  # Architecture
  vocab_size: 16000
  hidden_size: 768
  num_hidden_layers: 12
  num_attention_heads: 12

data:
  # DPO requires preference pairs (chosen, rejected)
  train_path: "data/dpo_train.jsonl"
  val_path: "data/dpo_val.jsonl"
  
  # Format: {"prompt": "...", "chosen": "...", "rejected": "..."}
  tokenizer_name: "ethiobbpe"
  max_length: 1024
  max_prompt_length: 512
  
  num_workers: 4

training:
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  
  learning_rate: 5e-7
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  max_steps: 2000
  
  bf16: true
  fp16: false

# DPO-specific parameters
dpo:
  beta: 0.1                  # Temperature parameter for DPO
  loss_type: "sigmoid"       # Loss type: "sigmoid", "hinge", "ipo"
  label_smoothing: 0.0
  rpo_alpha: null            # For RPO variant
  
  # Generate parameters during training
  max_new_tokens: 128
  temperature: 0.7
  top_p: 0.9

checkpoint:
  save_steps: 200
  save_total_limit: 2
  save_best_only: true

validation:
  eval_steps: 100
  eval_strategy: "steps"

logging:
  logging_steps: 10
  report_to: ["tensorboard", "wandb"]
  project_name: "nexuss-transformer"
  run_name: "dpo-alignment-v1"

output_dir: "outputs/dpo_alignment"
seed: 42
